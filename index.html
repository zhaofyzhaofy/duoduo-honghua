<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config={theme:{extend:{colors:{
      sky:'#E8F4FD',candy:'#FF6B9D',sunny:'#FFB347',leafy:'#6BCB77',
      ocean:'#4FC3F7',berry:'#9C6ADE',peach:'#FFE0EC',butter:'#FFF9E0',

  <style>
    :root{
      --bg:#E8F4FD;--card:#FFFFFF;--primary:#FF6B9D;--primary-light:#FFE0EC;
      --secondary:#FFB347;--accent:#6BCB77;--blue:#4FC3F7;--purple:#9C6ADE;
      --text:#4A3728;--muted:#B0997E;--border:#FFE0EC;--shadow:rgba(255,107,157,.2)
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'ZCOOL KuaiLe',cursive,system-ui;
      background:linear-gradient(180deg,#E8F4FD 0%,#FFF9E0 50%,#FFE0EC 100%);
      color:var(--text);min-height:100vh;min-height:100dvh;
      overflow-x:hidden;-webkit-tap-highlight-color:transparent;
    }

    /* 背景装饰：云朵和星星 */
    .cloud{position:fixed;pointer-events:none;z-index:0;opacity:.45}
    .cloud svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.04))}
    @keyframes drift{0%{transform:translateX(0)}100%{transform:translateX(30px)}}
    .cloud{animation:drift 8s ease-in-out alternate}

    .star-deco{position:fixed;pointer-events:none;z-index:0}
    @keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:.7;transform:scale(1.1)}}
    .star-deco{animation:twinkle 3s ease-in-out infinite}

    /* 进度环 */
    .ring-progress{transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);transform:rotate(-90deg);transform-origin:50% 50%}

    /* 弹出 */
    @keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.35)}100%{transform:scale(1)}}
    .dot-earned{animation:pop .45s ease-out}

    /* 摇晃 */
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}

    /* 花瓣飘落 */
    .petal{position:fixed;pointer-events:none;z-index:1000;animation:pFall linear forwards}
    @keyframes pFall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.2)}}

    /* 彩纸 */
    .cft{position:fixed;pointer-events:none;z-index:1001;animation:cFall linear forwards}
    @keyframes cFall{0%{opacity:1;transform:translateY(-10vh) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(1080deg)}}

    /* 模态框 */
    .modal-bg{transition:opacity .25s ease}.modal-bg.hide{opacity:0;pointer-events:none}
    .modal-box{transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .25s ease}.modal-bg.hide .modal-box{transform:translateY(40px) scale(.95);opacity:0}

    /* 按钮 */
    .btn-main{transition:transform .15s}.btn-main:active{transform:scale(.93)}

    /* 孩子卡片 */
    .kid-card{transition:all .25s ease;cursor:pointer;border:3px solid transparent}
    .kid-card.on{transform:translateY(-4px);box-shadow:0 8px 24px var(--shadow)}

    /* 快捷标签 */
    .qtag{transition:all .15s;cursor:pointer}.qtag:active{transform:scale(.92)}

    /* 记录项 */
    .rec-item{transition:transform .2s}

    /* Tab */
    .tbtn{transition:all .2s}.tbtn.on{color:var(--primary);transform:scale(1.05)}

    /* Toast */
    .toast-in{animation:tIn .35s ease,tOut .35s ease 2.2s forwards}
    @keyframes tIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

    /* 浮动 */
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

    /* 呼吸光 */
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,.35)}50%{box-shadow:0 0 0 14px rgba(255,107,157,0)}}

    /* 旋转 */
    @keyframes spin-slow{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* 滚动条 */
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:3px}

    /* 安全区域 */
    body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

    /* 安装横幅 */
    .install-bar{animation:slideU .4s ease}
    @keyframes slideU{from{transform:translateY(100%)}to{transform:translateY(0)}}

    /* 大圆角卡片 */
    .card-cute{border-radius:20px;border:3px solid var(--border);background:var(--card);box-shadow:0 4px 16px rgba(255,107,157,.08)}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>

<script>
// ==================== PWA 初始化 ====================
function genAppIcon(size){
  const c=document.createElement('canvas');c.width=c.height=size;
  const ctx=c.getContext('2d');
  // 圆角背景
  const r=size*.18;
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fillStyle='#E8F4FD';ctx.fill();ctx.clip();
  // 花
  const cx=size/2,cy=size*.4;
  const cols=['#FF6B9D','#FF8DB5','#FF6B9D','#FF8DB5','#FF6B9D'];
  for(let i=0;i<5;i++){
    const a=(i*72-90)*Math.PI/180;
    ctx.fillStyle=cols[i];ctx.beginPath();
    ctx.ellipse(cx+Math.cos(a)*size*.13,cy+Math.sin(a)*size*.13,size*.11,size*.07,a+Math.PI/2,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx,cy,size*.08,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFA000';ctx.beginPath();ctx.arc(cx,cy,size*.045,0,Math.PI*2);ctx.fill();
  // 茎
  ctx.strokeStyle='#6BCB77';ctx.lineWidth=size*.03;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx,cy+size*.13);ctx.quadraticCurveTo(cx+size*.05,size*.7,cx-size*.015,size*.88);ctx.stroke();
  return c.toDataURL('image/png');
}
function initManifest(){
  const icon192=genAppIcon(192),icon512=genAppIcon(512);
  const manifest={name:'朵朵红花 - 好孩子奖励',short_name:'朵朵红花',description:'给好孩子小红花的家庭奖励应用',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#E8F4FD',theme_color:'#FF6B9D',icons:[{src:icon192,sizes:'192x192',type:'image/png'},{src:icon512,sizes:'512x512',type:'image/png'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('manifestLink').href=URL.createObjectURL(blob);
  const link=document.createElement('link');link.rel='apple-touch-icon';link.href=icon192;document.head.appendChild(link);
}
function initSW(){
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
}
let deferredPrompt=null;
function initInstallPrompt(){
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!localStorage.getItem('installDismissed'))document.getElementById('installBar').classList.remove('hidden')});

function defaults(){
  return{need:20,children:[
    {id:1,name:'大宝',flowers:0,color:'#FF6B9D',emoji:'🧒',avatar:''},
    {id:2,name:'小宝',flowers:0,color:'#4FC3F7',emoji:'👶',avatar:''}
  ],records:[],wishes:[],tags:JSON.parse(JSON.stringify(DEF_TAGS)),unlockedMedals:{}};
}
function load(){
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s){
      const d=JSON.parse(s);
      if(d.children&&d.records){
        // 兼容老格式：tags 是字符串数组
        if(d.tags&&d.tags.length&&typeof d.tags[0]==='string'){
          const map={};DEF_TAGS.forEach(t=>{map[t.name]=t.dim});
          d.tags=d.tags.map(t=>({name:t,dim:map[t]||'self'}));
        }
        if(!d.tags)d.tags=JSON.parse(JSON.stringify(DEF_TAGS));
        if(!d.unlockedMedals)d.unlockedMedals={};
        d.children.forEach(c=>{if(!c.emoji)c.emoji='😊'});
        d.records.forEach(r=>{if(r.type==='earn'&&!r.dim)r.dim='self'});
        return d;
      }
    }
  }catch(e){}
  return defaults();
}
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(D))}

// ==================== 生成小花SVG ====================
function mkFlower(sz,color,on){
  let p='';
  const colors=[color,lighten(color),color,lighten(color),color];
  for(let i=0;i<5;i++){
    if(on){
      p+=`<g transform="rotate(${i*72})"><ellipse rx="4" ry="7" cy="-6.5" fill="${colors[i]}"/></g>`;
    }else{
      p+=`<g transform="rotate(${i*72})"><ellipse rx="4" ry="7" cy="-6.5" fill="none" stroke="${color}" stroke-width="1.2" opacity=".2"/></g>`;
    }
  }
  const center=on
    ?`<circle r="4.5" fill="#FFD700"/><circle r="2.5" fill="#FFA000" opacity=".5"/>`
    :`<circle r="4.5" fill="none" stroke="${color}" stroke-width="1.2" opacity=".2"/>`;
  // 茎和叶子（已获得才显示）
  const stem=on
    ?`<rect x="-1.5" y="5" width="3" height="5" rx="1.5" fill="#6BCB77"/><ellipse cx="4" cy="8" rx="3.5" ry="2" fill="#6BCB77" transform="rotate(-25,4,8)"/>`
    :'';
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 32 38"><g transform="translate(16,14)">${p}${center}</g>${stem}</svg>`;
}

function lighten(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>Math.min(255,v+50).toString(16).padStart(2,'0')).join('');
}

// ==================== 维度统计与连续天数 ====================
function getDimCounts(childId){
  const counts={self:0,care:0,explore:0,emotion:0};
  D.records.forEach(r=>{
    if(r.childId===childId&&r.type==='earn'&&counts.hasOwnProperty(r.dim))counts[r.dim]++;
  });
  return counts;
}

function getMaxStreak(childId){
  const dateSet={};
  D.records.forEach(r=>{if(r.childId===childId&&r.type==='earn')dateSet[new Date(r.date).toISOString().slice(0,10)]=true});
  const dates=Object.keys(dateSet).sort();
  if(!dates.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<dates.length;i++){
    const diff=(new Date(dates[i])-new Date(dates[i-1]))/864e5;
    if(Math.abs(diff-1)<0.1){cur++;if(cur>max)max=cur}else cur=1;
  }
  return max;
}

function getCurrentStreak(childId){
  const dateSet={};
  D.records.forEach(r=>{if(r.childId===childId&&r.type==='earn')dateSet[new Date(r.date).toISOString().slice(0,10)]=true});
  const dates=Object.keys(dateSet).sort().reverse();
  if(!dates.length)return 0;
  const today=new Date().toISOString().slice(0,10);
  const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
  if(dates[0]!==today&&dates[0]!==yest)return 0;
  let streak=1;
  for(let i=1;i<dates.length;i++){
    const diff=(new Date(dates[i-1])-new Date(dates[i]))/864e5;
    if(Math.abs(diff-1)<0.1)streak++;else break;
  }
  return streak;
}

// ==================== 核心操作 ====================
function giveFlower(childId,content,dim){
  const kid=D.children.find(c=>c.id===childId);
  if(!kid||!content.trim())return;
  kid.flowers++;
  D.records.unshift({id:Date.now(),childId,content:content.trim(),date:new Date().toISOString(),type:'earn',dim:dim||selDim||'self'});
  save();renderAll();animPetals();checkMedals(childId);
  if(kid.flowers>0&&kid.flowers%D.need===0){
    setTimeout(()=>{animCelebrate();toast(kid.name+' 集齐'+D.need+'朵红花，可以兑换礼物啦！','party')},350);
  }else{toast('给'+kid.name+' +1 朵小红花','ok')}
}

function delRecord(rid){
  const r=D.records.find(x=>x.id===rid);if(!r)return;
  const kid=D.children.find(c=>c.id===r.childId);
  if(r.type==='earn'&&kid)kid.flowers=Math.max(0,kid.flowers-1);
  if(r.type==='redeem'&&kid)kid.flowers+=(r.flowerCount||D.need);
  D.records=D.records.filter(x=>x.id!==rid);save();renderAll();toast('已撤销','info');
}

function undoLast(){
  const r=D.records.find(x=>x.childId===curKid&&x.type==='earn');
  if(!r){toast('没有可撤销的记录','err');return}
  showConfirm('确定撤销这朵小红花吗？<br><span style="color:var(--muted);font-size:14px">"'+r.content+'"</span>',()=>delRecord(r.id));
}

function addWish(childId,name){if(!name.trim())return;D.wishes.push({id:Date.now(),childId,name:name.trim()});save();renderAll();toast('心愿已添加','ok')}
function delWish(wid){D.wishes=D.wishes.filter(w=>w.id!==wid);save();renderAll()}

function redeem(childId,giftName){
  const kid=D.children.find(c=>c.id===childId);
  if(!kid||kid.flowers<D.need||!giftName.trim())return;
  kid.flowers-=D.need;
  D.records.unshift({id:Date.now(),childId,content:giftName.trim(),date:new Date().toISOString(),type:'redeem',flowerCount:D.need});
  const idx=D.wishes.findIndex(w=>w.childId===childId&&w.name===giftName.trim());
  if(idx>=0)D.wishes.splice(idx,1);
  save();renderAll();animCelebrate();toast(kid.name+' 成功兑换了'+giftName.trim()+'！','party');
}

function addTag(name,dim){if(!name.trim())return;const n=name.trim();if(D.tags.some(t=>t.name===n)){toast('标签已存在','err');return}D.tags.push({name:n,dim:dim||selDim||'self'});save();drawQTags();toast('标签已添加','ok')}
function removeTag(name){D.tags=D.tags.filter(t=>t.name!==name);if(selTag===name)selTag='';save();drawQTags()}

function checkMedals(childId){
  const counts=getDimCounts(childId);
  const streak=getMaxStreak(childId);
  const total=D.records.filter(r=>r.childId===childId&&r.type==='earn').length;
  const usedDims={};
  Object.keys(counts).forEach(k=>{if(counts[k]>0)usedDims[k]=true});

  const newly=[];
  MEDAL_DEFS.forEach(m=>{
    if(D.unlockedMedals[m.id])return;
    let progress=0;
    if(m.dim==='special'){
      if(m.id==='special_all')progress=Object.keys(usedDims).length;
      else if(m.id==='special_50')progress=total;
    }else if(m.dim==='persist'){
      progress=streak;
    }else{
      progress=counts[m.dim]||0;
    }
    if(progress>=m.need){
      D.unlockedMedals[m.id]=Date.now();
      newly.push(m);
    }
  });
  if(newly.length){
    save();
    // 依次展示勋章解锁弹窗
    newly.forEach((m,i)=>{
      setTimeout(()=>{
        document.getElementById('medalUnlockIcon').textContent=m.icon;
        document.getElementById('medalUnlockName').textContent=m.name;
        document.getElementById('medalUnlockDesc').textContent=m.desc;
        openM('mMedalUnlock');
        animPetals();
      },i*1500);
    });
  }
}

}

        <button onclick="delWish(${w.id})" class="w-8 h-8 rounded-lg flex items-center justify-center opacity-40 hover:opacity-100 hover:bg-red-50 transition" aria-label="删除"><i class="fa-solid fa-xmark text-sm"></i></button>

function htmlMedals(){
  const counts=getDimCounts(curKid);
  const streak=getMaxStreak(curKid);
  const total=D.records.filter(r=>r.childId===curKid&&r.type==='earn').length;
  const usedDims={};
  Object.keys(counts).forEach(k=>{if(counts[k]>0)usedDims[k]=true});

  // 当前勋章进度摘要
  let h='<div class="mb-4 p-4 rounded-2xl" style="background:linear-gradient(135deg,rgba(255,179,71,.1),rgba(255,107,157,.1));border:2px solid var(--secondary)">';
  h+='<p class="text-base font-bold mb-2" style="color:var(--secondary)"><i class="fa-solid fa-medal mr-1"></i>当前进度</p>';
  h+='<div class="grid grid-cols-2 gap-2 text-sm">';
  Object.entries(DIMS).forEach(([k,d])=>{
    h+=`<div class="flex items-center gap-1.5"><i class="fa-solid ${d.icon}" style="color:${d.color}"></i>${d.name} <strong style="color:${d.color}">${counts[k]||0}</strong></div>`;
  });
  h+=`<div class="flex items-center gap-1.5"><i class="fa-solid fa-fire" style="color:#4FC3F7"></i>最长连续 <strong style="color:#4FC3F7">${streak}</strong> 天</div>`;
  h+=`<div class="flex items-center gap-1.5"><i class="fa-solid fa-heart" style="color:var(--primary)"></i>累计 <strong style="color:var(--primary)">${total}</strong> 朵</div>`;
  h+='</div></div>';

  // 按维度分组勋章
  Object.entries(DIMS).forEach(([dk,dim])=>{
    const medals=MEDAL_DEFS.filter(m=>m.dim===dk);
    if(!medals.length)return;
    h+=`<div class="mb-4"><div class="flex items-center gap-2 mb-2">`;
    h+=`<div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:${dim.color}20"><i class="fa-solid ${dim.icon} text-sm" style="color:${dim.color}"></i></div>`;
    h+=`<span class="text-base font-bold" style="color:${dim.color}">${dim.name}勋章</span>`;
    h+=`<span class="text-xs" style="color:var(--muted)">${dim.label}</span></div>`;
    h+='<div class="grid grid-cols-3 gap-2">';
    medals.forEach(m=>{
      const unlocked=!!D.unlockedMedals[m.id];
      const progress=dk==='persist'?streak:(counts[dk]||0);
      const pct=Math.min(1,progress/m.need);
      const bg=unlocked?'#FFD70010':'#f5f5f5';
      const bc=unlocked?'#FFD70040':'#e0e0e0';
      const ft=unlocked?'filter:none':'filter:grayscale(1) opacity(.4)';
      h+=`<div class="medal-card p-3 rounded-2xl text-center" style="background:${bg};border:2px solid ${bc};${unlocked?'':'opacity:.7;'}">`;
      h+=`<div class="text-4xl mb-1" style="${ft}">${m.icon}</div>`;
      h+=`<p class="text-xs font-bold mb-1" style="color:${unlocked?dim.color:'var(--muted)'}">${m.name}</p>`;
      if(unlocked){
        h+=`<p class="text-[10px]" style="color:var(--accent)"><i class="fa-solid fa-check"></i> 已获得</p>`;
      }else{
        h+=`<div class="w-full h-1.5 rounded-full mb-1" style="background:${dim.color}15"><div class="h-full rounded-full" style="width:${pct*100}%;background:${dim.color}"></div></div>`;
        h+=`<p class="text-[10px]" style="color:var(--muted)">${progress}/${m.need}</p>`;
      }
      h+='</div>';
    });
    h+='</div></div>';
  });

  // 特殊勋章
  const specialMedals=MEDAL_DEFS.filter(m=>m.dim==='special');
  h+='<div class="mb-4"><div class="flex items-center gap-2 mb-2">';
  h+=`<div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:#FFD70020"><i class="fa-solid fa-crown text-sm" style="color:#FFD700"></i></div>`;
  h+=`<span class="text-base font-bold" style="color:#FFD700">特别勋章</span></div><div class="grid grid-cols-2 gap-2">`;
  specialMedals.forEach(m=>{
    const unlocked=!!D.unlockedMedals[m.id];
    let progress=0;
    if(m.id==='special_all')progress=Object.keys(usedDims).length;
    else if(m.id==='special_50')progress=total;
    const pct=Math.min(1,progress/m.need);
    const bg=unlocked?'#FFD70010':'#f5f5f5';
    const bc=unlocked?'#FFD70040':'#e0e0e0';
    const ft=unlocked?'filter:none':'filter:grayscale(1) opacity(.4)';
    h+=`<div class="medal-card p-3 rounded-2xl text-center" style="background:${bg};border:2px solid ${bc};${unlocked?'':'opacity:.7;'}">`;
    h+=`<div class="text-4xl mb-1" style="${ft}">${m.icon}</div>`;
    h+=`<p class="text-xs font-bold mb-1" style="color:${unlocked?'#D4A000':'var(--muted)'}">${m.name}</p>`;
    if(unlocked){
      h+=`<p class="text-[10px]" style="color:var(--accent)"><i class="fa-solid fa-check"></i> 已获得</p>`;
    }else{
      h+=`<div class="w-full h-1.5 rounded-full mb-1" style="background:#FFD70015"><div class="h-full rounded-full" style="width:${pct*100}%;background:#FFD700"></div></div>`;
      h+=`<p class="text-[10px]" style="color:var(--muted)">${progress}/${m.need}</p>`;
    }
    h+='</div>';
  });
  h+='</div></div>';

  const unlockedCount=Object.keys(D.unlockedMedals).length;
  h+=`<div class="text-center py-3"><p class="text-sm" style="color:var(--muted)">已解锁 ${unlockedCount} / ${MEDAL_DEFS.length} 枚勋章</p></div>`;
  return h;
}

  el.innerHTML=D.tags.map(t=>{

    const di=DIMS[typeof t==='string'?'self':t.dim]||DIMS.self;

    </span>`;
  }).join('');
}

function drawQTags(){
  const el=document.getElementById('qTags');
  // 按当前选中的维度过滤标签
  const visibleTags=D.tags.filter(t=>{
    const tdim=typeof t==='string'?'self':t.dim;
    return tdim===selDim;
  });
  let h=visibleTags.map(t=>{
    const tname=typeof t==='string'?t:t.name;
    const dimInfo=DIMS[selDim]||DIMS.self;
    const on=selTag===tname;
    return `<span class="qtag inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-bold" style="border:2px solid ${on?dimInfo.color:'var(--border)'};background:${on?dimInfo.color+'15':'var(--card)'};color:${on?dimInfo.color:'var(--text)'}" onclick="pickTag('${esc(tname)}')">
      <i class="fa-solid ${dimInfo.icon} text-[10px]"></i> ${tname}<i class="fa-solid fa-xmark text-[10px] opacity-30 hover:opacity-100 ml-0.5" onclick="event.stopPropagation();removeTag('${esc(tname)}')"></i>
    </span>`;
  }).join('');
  h+=`<span class="qtag inline-flex items-center justify-center w-9 h-9 rounded-xl text-sm" style="border:2px dashed var(--border);color:var(--muted)" onclick="showAddTag()"><i class="fa-solid fa-plus"></i></span>`;
  el.innerHTML=h;
}

function pickTag(t){
  selTag=selTag===t?'':t;
  const found=D.tags.find(x=>(typeof x==='string'?x:x.name)===t);
  selDim=(found&&typeof found==='object')?(found.dim||'self'):'self';
  document.getElementById('giveInput').value=selTag;
  drawDimBtns();drawQTags();
}
function showAddTag(){document.getElementById('addTagArea').classList.remove('hidden');document.getElementById('newTagInput').value='';setTimeout(()=>document.getElementById('newTagInput').focus(),100)}

function doAddTag(){

      <p class="text-lg mb-5">${msg}</p>
      <div class="flex gap-3">
        <button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 rounded-xl text-base" style="background:var(--primary-light);color:var(--primary);border:2px solid var(--primary)">取消</button>
        <button id="_cfYes" class="flex-1 py-3 rounded-xl text-white text-base" style="background:var(--primary)">确认</button>
      </div>
    </div></div>`;
  document.getElementById('_cfYes').onclick=()=>{wrap.innerHTML='';onYes()};
}

function askDel(rid){
  const r=D.records.find(x=>x.id===rid);if(!r)return;
  const action=r.type==='earn'?'撤销这朵红花':'撤销这次兑换';
  showConfirm(`确定${action}吗？<br><span style="color:var(--muted);font-size:14px">"${r.content}"</span>`,()=>delRecord(rid));
}
function askReset(){
  showConfirm('确定要清除所有数据吗？<br><span style="color:var(--muted);font-size:14px">此操作不可恢复</span>',()=>{D=defaults();curKid=D.children[0].id;save();renderAll();closeM('mSet');toast('数据已重置','info')});
}

// 选择并压缩图片作为头像
function pickAvatar(idx,input){
  const file=input.files&&input.files[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){toast('请选择图片文件','err');input.value='';return}
  if(file.size>10*1024*1024){toast('图片不能超过10MB','err');input.value='';return}
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=256;
      let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=h*MAX/w;w=MAX}
      else if(h>MAX){w=w*MAX/h;h=MAX}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      try{
        D.children[idx].avatar=c.toDataURL('image/jpeg',0.82);
        save();renderAll();openSettings();
        toast('头像已更新','ok');
      }catch(err){
        toast('图片保存失败，请换一张试试','err');
      }
    };
    img.onerror=()=>toast('图片读取失败','err');
    img.src=e.target.result;
  };
  reader.onerror=()=>toast('文件读取失败','err');
  reader.readAsDataURL(file);
  input.value='';
}

// ==================== Tab ====================
function goTab(t){
  curTab=t;
  document.querySelectorAll('.tbtn').forEach(b=>{
    const on=b.dataset.t===t;
    b.classList.toggle('on',on);
    const div=b.querySelector('div');
    if(div){
      div.style.background=on?'var(--primary-light)':'#f3f4f6';
      div.querySelector('i').style.color=on?'var(--primary)':'var(--muted)';
    }
  });
  renderMain();
}

// ==================== 动画 ====================
function animPetals(){
  const cols=['#FF6B9D','#FF8DB5','#FFB347','#FFD180','#6BCB77','#4FC3F7'];
  for(let i=0;i<12;i++){setTimeout(()=>{
    const p=document.createElement('div');p.className='petal';
    Object.assign(p.style,{left:(Math.random()*80+10)+'vw',top:'-20px',
      width:(Math.random()*16+10)+'px',height:(Math.random()*16+10)+'px',
      background:cols[~~(Math.random()*cols.length)],borderRadius:'50% 0 50% 0',
      animationDuration:(Math.random()*2+2)+'s'});
    document.body.appendChild(p);setTimeout(()=>p.remove(),4500);
  },i*70)}
}

function animCelebrate(){
  const cols=['#FF6B9D','#FFB347','#6BCB77','#FFD180','#4FC3F7','#9C6ADE','#FF8DB5'];
  for(let i=0;i<45;i++){setTimeout(()=>{
    const c=document.createElement('div');c.className='cft';
    Object.assign(c.style,{left:(Math.random()*100)+'vw',
      width:(Math.random()*10+5)+'px',height:(Math.random()*10+5)+'px',
      background:cols[~~(Math.random()*cols.length)],borderRadius:Math.random()>.5?'50%':'3px',
      animationDuration:(Math.random()*2+2)+'s',animationDelay:(Math.random()*.5)+'s'});
    document.body.appendChild(c);setTimeout(()=>c.remove(),5000);
  },i*35)}
}

// ==================== Toast ====================
function toast(msg,type){
  const ct=document.getElementById('toasts');
  const t=document.createElement('div');
  const bg={ok:'var(--primary)',err:'#EF4444',info:'#4A3728',party:'var(--secondary)'}[type]||'#4A3728';
  const ic={ok:'fa-heart',err:'fa-circle-exclamation',info:'fa-circle-info',party:'fa-star'}[type]||'fa-circle-info';
  t.className='toast-in flex items-center gap-2 px-5 py-3 rounded-2xl text-white text-base shadow-lg whitespace-nowrap';
  t.style.background=bg;t.innerHTML=`<i class="fa-solid ${ic}"></i>${msg}`;
  ct.appendChild(t);setTimeout(()=>t.remove(),2800);
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}

// ==================== 初始化 ====================
initManifest();initSW();initInstallPrompt();renderAll();
</script>
